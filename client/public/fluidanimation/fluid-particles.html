<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluid Particles</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#2020e0;overflow:hidden;font-family:'Inter',sans-serif;cursor:none;}
canvas{display:block;position:fixed;top:0;left:0;}
.ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;}
.sub{color:rgba(255,255,255,0.7);font-size:13px;letter-spacing:3px;text-transform:uppercase;margin-bottom:24px;}
h1{color:#fff;font-size:clamp(52px,8vw,110px);font-weight:700;line-height:1;text-align:center;line-height:1.05;}
.cursor{position:fixed;width:12px;height:12px;background:#fff;border-radius:50%;pointer-events:none;z-index:999;transform:translate(-50%,-50%);transition:transform 0.1s;mix-blend-mode:difference;}
.scroll-btn{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.95);border:none;border-radius:50px;padding:14px 32px;font-size:13px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:10px;pointer-events:all;z-index:20;}
.arrow{animation:bounce 1.5s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(4px);}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="cursor" id="cursor"></div>
<div class="ui">
  <div class="sub">Is your big idea ready to go wild?</div>
  <h1>Let's work<br>together!</h1>
</div>
<button class="scroll-btn">
  <span class="arrow">↓</span> Continue to scroll <span class="arrow">↓</span>
</button>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cursor = document.getElementById('cursor');

let W, H;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const SHAPES = ['circle','square','cross','triangle','diamond'];
const NUM = 2200;
const BG = '#2020e0';

const mouse = {x:W/2, y:H, vx:0, vy:0};
let active = false;

// particle density follows a wave curve (like Lusion — dense bottom, sparse top)
const particles = Array.from({length:NUM}, ()=>{
  const t = Math.random();
  // bias toward bottom with wave shape
  const py = H * (0.3 + Math.pow(Math.random(),0.5) * 0.7);
  const px = Math.random() * W;
  const sz = 1.5 + Math.random() * 5;
  return {
    x:px, y:py, ox:px, oy:py,
    vx:0, vy:0,
    shape: SHAPES[Math.floor(Math.random()*SHAPES.length)],
    size: sz,
    alpha: 0.45 + Math.random()*0.55,
    phase: Math.random()*Math.PI*2,
    spd: 0.35 + Math.random()*0.9,
    str: 0.4 + Math.random()*0.6,
    rot: Math.random()*Math.PI*2,
    rotSpd: (Math.random()-0.5)*0.04,
  };
});

// scatter some in top area (sparse)
for(let i=0;i<180;i++){
  const p = particles[i];
  p.ox = p.x = Math.random()*W;
  p.oy = p.y = Math.random()*H*0.4;
  p.size = 1.5 + Math.random()*3;
  p.alpha = 0.2 + Math.random()*0.4;
}

function drawShape(p){
  const {x,y,size:s,shape,rot} = p;
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(rot);
  if(shape==='circle'){
    ctx.beginPath();ctx.arc(0,0,s*0.5,0,Math.PI*2);ctx.fill();
  } else if(shape==='square'){
    ctx.fillRect(-s*.45,-s*.45,s*.9,s*.9);
  } else if(shape==='diamond'){
    ctx.beginPath();ctx.moveTo(0,-s*.6);ctx.lineTo(s*.45,0);ctx.lineTo(0,s*.6);ctx.lineTo(-s*.45,0);ctx.closePath();ctx.fill();
  } else if(shape==='triangle'){
    ctx.beginPath();ctx.moveTo(0,-s*.6);ctx.lineTo(s*.55,s*.45);ctx.lineTo(-s*.55,s*.45);ctx.closePath();ctx.fill();
  } else {
    const t=s*.16;
    ctx.fillRect(-t,-s*.5,t*2,s);
    ctx.fillRect(-s*.5,-t,s,t*2);
  }
  ctx.restore();
}

let time = 0;
function animate(){
  requestAnimationFrame(animate);
  time += 0.014;

  ctx.fillStyle = BG;
  ctx.fillRect(0,0,W,H);

  for(let i=0;i<particles.length;i++){
    const p = particles[i];

    // layered fluid noise
    const n1 = Math.sin(p.ox*0.011+time*p.spd*0.5+p.phase)*Math.cos(p.oy*0.008-time*0.3);
    const n2 = Math.sin(p.ox*0.006-p.oy*0.009+time*p.spd*0.4+p.phase*1.3);
    const angle = (n1+n2)*Math.PI*3;
    const wave = Math.sin(p.ox*0.007+time*0.7+p.phase)*1.4*p.str;

    // fluid drift
    p.vx += Math.cos(angle)*0.15*p.str;
    p.vy += Math.sin(angle)*0.1*p.str + wave*0.12;

    // mouse repulsion
    if(active){
      const dx=p.x-mouse.x, dy=p.y-mouse.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const R=110;
      if(dist<R){
        const f=Math.pow(1-dist/R,2)*6;
        const nd=dist||1;
        p.vx+=(dx/nd)*f + mouse.vx*0.4*(1-dist/R);
        p.vy+=(dy/nd)*f + mouse.vy*0.4*(1-dist/R);
      }
    }

    // spring back to origin
    p.vx += (p.ox-p.x)*0.022;
    p.vy += (p.oy-p.y)*0.022;

    // damping
    p.vx *= 0.87;
    p.vy *= 0.87;

    p.x += p.vx;
    p.y += p.vy;
    p.rot += p.rotSpd;

    ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
    drawShape(p);
  }
}

// mouse
window.addEventListener('mousemove', e=>{
  mouse.vx = e.clientX - mouse.x;
  mouse.vy = e.clientY - mouse.y;
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  active = true;
  cursor.style.left = e.clientX+'px';
  cursor.style.top = e.clientY+'px';
});
window.addEventListener('mouseleave',()=>active=false);

animate();
</script>
</body>
</html>
